[target.x86_64-unknown-linux-gnu]
linker = ".cargo/linkers/linux-x86_64-mold.sh"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=--as-needed",
  "-C", "link-arg=--build-id",
]

[target.aarch64-unknown-linux-gnu]
linker = ".cargo/linkers/linux-aarch64-mold.sh"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=--as-needed",
  "-C", "link-arg=--build-id",
]

[target.aarch64-apple-darwin]
linker = ".cargo/linkers/macos-aarch64-lld.sh"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-dead_strip",
  "-C", "link-arg=-adhoc_codesign",
]

[target.x86_64-apple-darwin]
linker = ".cargo/linkers/macos-x86_64-lld.sh"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-dead_strip",
  "-C", "link-arg=-adhoc_codesign",
]

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=/incremental:no",
  "-C", "link-arg=/opt:ref",
  "-C", "link-arg=/opt:icf",
]

[target.aarch64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=/incremental:no",
  "-C", "link-arg=/opt:ref",
  "-C", "link-arg=/opt:icf",
]
