[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-fuse-ld=mold",
  "-C", "link-arg=-Wl,--threads",
  "-C", "link-arg=-Wl,--as-needed",
  "-C", "link-arg=-Wl,--build-id=fast",
]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-fuse-ld=mold",
  "-C", "link-arg=-Wl,--threads",
  "-C", "link-arg=-Wl,--as-needed",
  "-C", "link-arg=-Wl,--build-id=fast",
]

[target.aarch64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-fuse-ld=lld",
]

[target.x86_64-apple-darwin]
linker = "clang"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=-fuse-ld=lld",
]

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=/incremental:no",
  "-C", "link-arg=/opt:ref",
  "-C", "link-arg=/opt:icf",
]

[target.aarch64-pc-windows-msvc]
linker = "lld-link"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-arg=/incremental:no",
  "-C", "link-arg=/opt:ref",
  "-C", "link-arg=/opt:icf",
]
