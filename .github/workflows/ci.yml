name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

jobs:
  build-linux:
    name: Build (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Build release
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu \
            --config 'target.x86_64-unknown-linux-gnu.rustflags=["-C","target-cpu=x86-64","-C","link-arg=--as-needed","-C","link-arg=--build-id"]'
      - name: Package portable bundle
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform linux \
            --binary target/x86_64-unknown-linux-gnu/release/arden \
            --asset-name arden-linux-x64-portable \
            --bundle-root dist \
            --llvm-prefix "${LLVM_SYS_221_PREFIX}" \
            --extra-bin "$(command -v mold)"
      - uses: actions/upload-artifact@v7
        with:
          name: arden-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/arden
      - uses: actions/upload-artifact@v7
        with:
          name: arden-linux-x64-portable
          path: dist/arden-linux-x64-portable.tar.gz

  build-macos:
    name: Build (macos-arm64)
    runs-on: macos-latest
    env:
      CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-aarch64-lld.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package portable bundle
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform macos \
            --binary target/aarch64-apple-darwin/release/arden \
            --asset-name arden-macos-arm64-portable \
            --bundle-root dist \
            --llvm-prefix "${LLVM_SYS_221_PREFIX}" \
            --extra-prefix "$(brew --prefix lld)"
      - uses: actions/upload-artifact@v7
        with:
          name: arden-macos-arm64
          path: target/aarch64-apple-darwin/release/arden
      - uses: actions/upload-artifact@v7
        with:
          name: arden-macos-arm64-portable
          path: dist/arden-macos-arm64-portable.tar.gz

  build-macos-intel:
    name: Build (macos-x64)
    runs-on: macos-26-intel
    env:
      CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-x86_64-lld.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin
      - name: Package portable bundle
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform macos \
            --binary target/x86_64-apple-darwin/release/arden \
            --asset-name arden-macos-x64-portable \
            --bundle-root dist \
            --llvm-prefix "${LLVM_SYS_221_PREFIX}" \
            --extra-prefix "$(brew --prefix lld)"
      - uses: actions/upload-artifact@v7
        with:
          name: arden-macos-x64
          path: target/x86_64-apple-darwin/release/arden
      - uses: actions/upload-artifact@v7
        with:
          name: arden-macos-x64-portable
          path: dist/arden-macos-x64-portable.tar.gz

  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: lld-link
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/cache@v5
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\xml2s.lib" -Force
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - name: Package portable bundle
        shell: bash
        env:
          BUNDLE_LLVM_PREFIX: ${{ env.ARDEN_LLVM_REAL_PREFIX }}
          ARDEN_WINDOWS_VC_LIB_DIR: ${{ env.ARDEN_WINDOWS_VC_LIB_DIR }}
          ARDEN_WINDOWS_UCRT_LIB_DIR: ${{ env.ARDEN_WINDOWS_UCRT_LIB_DIR }}
          ARDEN_WINDOWS_UM_LIB_DIR: ${{ env.ARDEN_WINDOWS_UM_LIB_DIR }}
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform windows \
            --binary target/x86_64-pc-windows-msvc/release/arden.exe \
            --asset-name arden-windows-x64-portable \
            --bundle-root dist \
            --llvm-prefix "${BUNDLE_LLVM_PREFIX}" \
            --extra-lib-dir "vc=${ARDEN_WINDOWS_VC_LIB_DIR}" \
            --extra-lib-dir "ucrt=${ARDEN_WINDOWS_UCRT_LIB_DIR}" \
            --extra-lib-dir "um=${ARDEN_WINDOWS_UM_LIB_DIR}"
      - uses: actions/upload-artifact@v7
        with:
          name: arden-windows-x64
          path: target/x86_64-pc-windows-msvc/release/arden.exe
      - uses: actions/upload-artifact@v7
        with:
          name: arden-windows-x64-portable
          path: dist/arden-windows-x64-portable.zip

  checks-linux:
    name: Rust Checks (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose -- --no-capture
      - run: cargo test --locked --release --all-targets --verbose -- --no-capture
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  checks-macos:
    name: Rust Checks (macos-arm64)
    runs-on: macos-latest
    env:
      CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-aarch64-lld.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.12'
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose -- --no-capture
      - run: cargo test --locked --release --all-targets --verbose -- --no-capture
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  checks-macos-intel:
    name: Rust Checks (macos-x64)
    runs-on: macos-26-intel
    env:
      CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-x86_64-lld.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.12'
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose -- --no-capture
      - run: cargo test --locked --release --all-targets --verbose -- --no-capture
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  checks-windows:
    name: Rust Checks (windows-x64)
    runs-on: windows-latest
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: lld-link
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.12'
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\xml2s.lib" -Force
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - run: cargo check --locked --all-targets --all-features --verbose
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo test --locked --verbose -- --no-capture
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo test --locked --release --all-targets --verbose -- --no-capture
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}

  audit-linux:
    name: Dependency Audit (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  coverage-linux:
    name: Coverage Gate (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Enforce line coverage threshold
        run: cargo llvm-cov --locked --workspace --all-features --lcov --output-path lcov.info --fail-under-lines 55
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  fuzz-smoke-linux:
    name: Fuzz Smoke (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ${{ github.workspace }}/.cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: ./.github/actions/install-llvm
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run lexer/parser fuzz smoke
        run: cargo fuzz run lexer_parser --sanitizer address -- -max_total_time=90 -jobs=1 -workers=1
        working-directory: fuzz

  sanitizer-linux:
    name: Sanitizer (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ${{ github.workspace }}/.cargo/linkers/linux-x86_64-mold.sh
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -Z sanitizer=address
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sanitizer-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
      - name: Run test suite under ASan
        run: cargo test --locked --all-targets --all-features --target x86_64-unknown-linux-gnu

  smoke-linux:
    name: CLI Smoke (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-linux-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  smoke-macos:
    name: CLI Smoke (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-macos-arm64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  smoke-macos-intel:
    name: CLI Smoke (macos-x64)
    runs-on: macos-26-intel
    needs: build-macos-intel
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-macos-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  smoke-windows:
    name: CLI Smoke (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-windows-x64
          path: target/release
      - run: .\scripts\cli_smoke_windows.ps1
        shell: pwsh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}\target\release\arden.exe

  benchmarks-quick:
    name: Bench Quick (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            linker_env_name: CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER
            linker_env_value: .cargo/linkers/linux-x86_64-mold.sh
          - name: macos-arm64
            os: macos-latest
            linker_env_name: CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER
            linker_env_value: .cargo/linkers/macos-aarch64-lld.sh
          - name: windows-x64
            os: windows-latest
            linker_env_name: CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER
            linker_env_value: lld-link
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.12'
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\xml2s.lib" -Force
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - name: Build Arden release compiler
        shell: bash
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
        run: |
          export "${{ matrix.linker_env_name }}=${{ matrix.linker_env_value }}"
          cargo build --release
      - name: Run quick benchmark suite
        shell: bash
        env:
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
        run: |
          export "${{ matrix.linker_env_name }}=${{ matrix.linker_env_value }}"
          mkdir -p benchmark/results/ci/${{ matrix.name }}

          python3 benchmark/run.py \
            --no-build \
            --kinds runtime compile \
            --repeats 3 \
            --warmup 1 \
            --arden-timings \
            --output-csv

          cp benchmark/results/latest.json benchmark/results/ci/${{ matrix.name }}/quick_suite.json
          cp benchmark/results/latest.md benchmark/results/ci/${{ matrix.name }}/quick_suite.md
          cp benchmark/results/latest.csv benchmark/results/ci/${{ matrix.name }}/quick_suite.csv

          printf '\n%s\n' 'Quick benchmark suite summary:'
          cat benchmark/results/ci/${{ matrix.name }}/quick_suite.md
      - uses: actions/upload-artifact@v7
        with:
          name: bench-quick-${{ matrix.name }}
          path: benchmark/results/ci/${{ matrix.name }}

  portable-smoke-linux:
    name: Portable Smoke (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: arden-linux-x64-portable
          path: dist
      - run: bash scripts/release/smoke_portable_unix.sh dist/arden-linux-x64-portable.tar.gz

  portable-smoke-macos:
    name: Portable Smoke (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: arden-macos-arm64-portable
          path: dist
      - run: bash scripts/release/smoke_portable_unix.sh dist/arden-macos-arm64-portable.tar.gz

  portable-smoke-macos-intel:
    name: Portable Smoke (macos-x64)
    runs-on: macos-26-intel
    needs: build-macos-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: arden-macos-x64-portable
          path: dist
      - run: bash scripts/release/smoke_portable_unix.sh dist/arden-macos-x64-portable.tar.gz

  portable-smoke-windows:
    name: Portable Smoke (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: arden-windows-x64-portable
          path: dist
      - run: .\scripts\release\smoke_portable_windows.ps1 -ArchivePath dist\arden-windows-x64-portable.zip
        shell: pwsh

  examples-linux:
    name: Examples (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-linux-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/examples_smoke_linux.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  examples-macos:
    name: Examples (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-macos-arm64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/examples_smoke_macos.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  examples-macos-intel:
    name: Examples (macos-x64)
    runs-on: macos-26-intel
    needs: build-macos-intel
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-macos-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/examples_smoke_macos.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  examples-windows:
    name: Examples (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v8
        with:
          name: arden-windows-x64
          path: target/release
      - run: scripts\examples_smoke.bat
        shell: cmd
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}\target\release\arden.exe

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  required-gates:
    name: Required CI Gates
    runs-on: ubuntu-latest
    needs:
      - checks-linux
      - checks-macos
      - checks-macos-intel
      - checks-windows
      - audit-linux
      - coverage-linux
      - fuzz-smoke-linux
      - sanitizer-linux
      - smoke-linux
      - smoke-macos
      - smoke-macos-intel
      - smoke-windows
      - portable-smoke-linux
      - portable-smoke-macos
      - portable-smoke-macos-intel
      - portable-smoke-windows
      - examples-linux
      - examples-macos
      - examples-macos-intel
      - examples-windows
      - web
    steps:
      - name: Confirm required gates
        run: echo "All required CI gates passed"
