name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package portable bundle
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform linux \
            --binary target/x86_64-unknown-linux-gnu/release/arden \
            --asset-name arden-linux-x64-portable \
            --bundle-root dist \
            --llvm-prefix "${LLVM_SYS_221_PREFIX}" \
            --extra-bin "$(command -v mold)"
      - uses: actions/upload-artifact@v4
        with:
          name: arden-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/arden
      - uses: actions/upload-artifact@v4
        with:
          name: arden-linux-x64-portable
          path: dist/arden-linux-x64-portable.tar.gz

  build-macos:
    name: Build (macos-arm64)
    runs-on: macos-latest
    env:
      CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-aarch64-lld.sh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package portable bundle
        shell: bash
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform macos \
            --binary target/aarch64-apple-darwin/release/arden \
            --asset-name arden-macos-arm64-portable \
            --bundle-root dist \
            --llvm-prefix "${LLVM_SYS_221_PREFIX}" \
            --extra-prefix "$(brew --prefix lld)"
      - uses: actions/upload-artifact@v4
        with:
          name: arden-macos-arm64
          path: target/aarch64-apple-darwin/release/arden
      - uses: actions/upload-artifact@v4
        with:
          name: arden-macos-arm64-portable
          path: dist/arden-macos-arm64-portable.tar.gz

  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: lld-link
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - name: Package portable bundle
        shell: bash
        env:
          BUNDLE_LLVM_PREFIX: ${{ env.ARDEN_LLVM_REAL_PREFIX }}
          ARDEN_WINDOWS_VC_LIB_DIR: ${{ env.ARDEN_WINDOWS_VC_LIB_DIR }}
          ARDEN_WINDOWS_UCRT_LIB_DIR: ${{ env.ARDEN_WINDOWS_UCRT_LIB_DIR }}
          ARDEN_WINDOWS_UM_LIB_DIR: ${{ env.ARDEN_WINDOWS_UM_LIB_DIR }}
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform windows \
            --binary target/x86_64-pc-windows-msvc/release/arden.exe \
            --asset-name arden-windows-x64-portable \
            --bundle-root dist \
            --llvm-prefix "${BUNDLE_LLVM_PREFIX}" \
            --extra-lib-dir "vc=${ARDEN_WINDOWS_VC_LIB_DIR}" \
            --extra-lib-dir "ucrt=${ARDEN_WINDOWS_UCRT_LIB_DIR}" \
            --extra-lib-dir "um=${ARDEN_WINDOWS_UM_LIB_DIR}"
      - uses: actions/upload-artifact@v4
        with:
          name: arden-windows-x64
          path: target/x86_64-pc-windows-msvc/release/arden.exe
      - uses: actions/upload-artifact@v4
        with:
          name: arden-windows-x64-portable
          path: dist/arden-windows-x64-portable.zip

  checks-linux:
    name: Rust Checks (linux-x64)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose
      - run: cargo test --locked --release --all-targets --verbose
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  checks-macos:
    name: Rust Checks (macos-arm64)
    runs-on: macos-latest
    env:
      CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: .cargo/linkers/macos-aarch64-lld.sh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose
      - run: cargo test --locked --release --all-targets --verbose
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  checks-windows:
    name: Rust Checks (windows-x64)
    runs-on: windows-latest
    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: lld-link
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - run: cargo check --locked --all-targets --all-features --verbose
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo test --locked --verbose
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo test --locked --release --all-targets --verbose
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: ${{ format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) }}

  smoke-linux:
    name: CLI Smoke (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-linux-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  smoke-macos:
    name: CLI Smoke (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-macos-arm64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  smoke-windows:
    name: CLI Smoke (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-windows-x64
          path: target/release
      - run: .\scripts\cli_smoke_windows.ps1
        shell: pwsh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}\target\release\arden.exe

  portable-smoke-linux:
    name: Portable Smoke (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arden-linux-x64-portable
          path: dist
      - run: bash scripts/release/smoke_portable_unix.sh dist/arden-linux-x64-portable.tar.gz

  portable-smoke-macos:
    name: Portable Smoke (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arden-macos-arm64-portable
          path: dist
      - run: bash scripts/release/smoke_portable_unix.sh dist/arden-macos-arm64-portable.tar.gz

  portable-smoke-windows:
    name: Portable Smoke (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arden-windows-x64-portable
          path: dist
      - run: .\scripts\release\smoke_portable_windows.ps1 -ArchivePath dist\arden-windows-x64-portable.zip
        shell: pwsh

  examples-linux:
    name: Examples (linux-x64)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-linux-x64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/examples_smoke_linux.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  examples-macos:
    name: Examples (macos-arm64)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-macos-arm64
          path: target/release
      - run: chmod +x target/release/arden
      - run: bash scripts/examples_smoke_macos.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}/target/release/arden

  examples-windows:
    name: Examples (windows-x64)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: arden-windows-x64
          path: target/release
      - run: scripts\examples_smoke.bat
        shell: cmd
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          ARDEN_COMPILER_PATH: ${{ github.workspace }}\target\release\arden.exe

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
