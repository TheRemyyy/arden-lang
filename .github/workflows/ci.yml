name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: apex-compiler-linux-release
          path: target/release/apex-compiler

  checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --locked --all-targets --all-features --verbose
      - run: cargo test --locked --verbose
      - run: cargo test --locked --release --all-targets --verbose
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: apex-compiler-linux-release
          path: target/release
      - run: chmod +x target/release/apex-compiler
      - run: bash scripts/ci_cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          APEX_COMPILER_PATH: ${{ github.workspace }}/target/release/apex-compiler

  examples:
    name: Check Examples
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: apex-compiler-linux-release
          path: target/release
      - run: chmod +x target/release/apex-compiler
      - name: Run examples
        run: |
          COMPILER=./target/release/apex-compiler
          for file in examples/*.apex; do
            "$COMPILER" check "$file"
            "$COMPILER" run "$file"
          done
          for project in examples/multi_file_project examples/multi_file_depth_project examples/test_no_import; do
            [ -d "$project" ] && (cd "$project" && ../../target/release/apex-compiler run)
          done

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
