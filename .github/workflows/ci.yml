name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: apex-compiler-linux-x64
            binary_path: target/x86_64-unknown-linux-gnu/release/apex-compiler
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: apex-compiler-macos-arm64
            binary_path: target/aarch64-apple-darwin/release/apex-compiler
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: apex-compiler-windows-x64
            binary_path: target/x86_64-pc-windows-msvc/release/apex-compiler.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          LLVM_SYS_211_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  checks:
    name: Rust Checks (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
          - label: macos-arm64
            os: macos-latest
          - label: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-llvm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-checks-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV
      - run: cargo check --locked --all-targets --all-features --verbose
        env:
          LLVM_SYS_211_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
      - run: cargo test --locked --verbose
        env:
          LLVM_SYS_211_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
      - run: cargo test --locked --release --all-targets --verbose
        env:
          LLVM_SYS_211_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}
      - run: cargo fmt -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
        env:
          LLVM_SYS_211_PREFIX: ${{ env.LLVM_SYS_211_PREFIX }}
          RUSTFLAGS: ${{ runner.os == 'Windows' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}

  smoke:
    name: CLI Smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            artifact_name: apex-compiler-linux-x64
            compiler_path: target/release/apex-compiler
          - label: macos-arm64
            os: macos-latest
            artifact_name: apex-compiler-macos-arm64
            compiler_path: target/release/apex-compiler
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release
      - run: chmod +x ${{ matrix.compiler_path }}
      - run: bash scripts/ci_cli_smoke.sh
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          APEX_COMPILER_PATH: ${{ github.workspace }}/${{ matrix.compiler_path }}

  examples:
    name: Examples (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            artifact_name: apex-compiler-linux-x64
            compiler_path: target/release/apex-compiler
            prepare_cmd: chmod +x target/release/apex-compiler
            run_cmd: bash scripts/test_examples_linux.sh
          - label: macos-arm64
            os: macos-latest
            artifact_name: apex-compiler-macos-arm64
            compiler_path: target/release/apex-compiler
            prepare_cmd: chmod +x target/release/apex-compiler
            run_cmd: bash scripts/test_examples_macos.sh
          - label: windows-x64
            os: windows-latest
            artifact_name: apex-compiler-windows-x64
            compiler_path: target/release/apex-compiler.exe
            prepare_cmd: ''
            run_cmd: scripts\\test_examples.bat
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release
      - name: Prepare compiler
        if: matrix.prepare_cmd != ''
        run: ${{ matrix.prepare_cmd }}
      - name: Run examples (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.run_cmd }}
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          APEX_COMPILER_PATH: ${{ github.workspace }}/${{ matrix.compiler_path }}
      - name: Run examples (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.run_cmd }}
        env:
          CI_SKIP_COMPILER_BUILD: "1"
          APEX_COMPILER_PATH: ${{ github.workspace }}/${{ matrix.compiler_path }}

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  benchmark:
    name: Performance Benchmark (linux-x64)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-llvm
      - uses: actions/download-artifact@v4
        with:
          name: apex-compiler-linux-x64
          path: target/release
      - name: Setup Environment
        run: |
          chmod +x target/release/apex-compiler
          echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
      - name: Run Benchmark
        run: |
          cd benchmark
          mkdir -p results
          python3 run.py
      - name: Display Results
        run: |
          if [ -f benchmark/results/latest.md ]; then
            cat benchmark/results/latest.md >> $GITHUB_STEP_SUMMARY
            cat benchmark/results/latest.md
          else
            echo "File benchmark/results/latest.md not found."
            ls -R benchmark/
          fi
