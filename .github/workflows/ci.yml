name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo apt-get install -y llvm-21-dev libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check (all targets/features)
        run: cargo check --locked --all-targets --all-features --verbose

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Run release tests
        run: cargo test --locked --release --all-targets --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo apt-get install -y llvm-21-dev libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Build compiler
        run: cargo build --release

      - name: Run CLI smoke coverage
        run: bash scripts/ci_cli_smoke.sh

  check-examples:
    name: Check Examples
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo apt-get install -y llvm-21-dev libpolly-21-dev
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV

      - name: Build compiler
        run: cargo build --release

      - name: Check and run all examples
        run: |
          # Single-file examples
          for file in examples/*.apex; do
            echo "Checking $file..."
            cargo run --release -- check "$file"
            echo "Running $file..."
            cargo run --release -- run "$file"
          done
          
          # Multi-file projects
          for project in examples/multi_file_project examples/multi_file_depth_project examples/test_no_import; do
            if [ -d "$project" ]; then
              echo "Testing project $project..."
              cd "$project"
              ../../target/release/apex-compiler run
              cd ../..
            fi
          done

  web:
    name: Web Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build
