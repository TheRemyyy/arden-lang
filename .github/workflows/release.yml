name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  attestations: write

env:
  COSIGN_YES: "true"
  SBOM_FILE: all-artifacts/arden-sbom.json
  PROVENANCE_FILE: all-artifacts/provenance.intoto.jsonl
  SIGNATURE_FILE: all-artifacts/SHA256SUMS.txt.sig
  CERTIFICATE_FILE: all-artifacts/SHA256SUMS.txt.pem
  BUNDLE_FILE: all-artifacts/SHA256SUMS.txt.bundle
  SLSA_PROVENANCE_FILE: all-artifacts/slsa-provenance.jsonl

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            artifact_name: arden.exe
            asset_name: arden-windows-x64-portable
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
            artifact_name: arden
            asset_name: arden-linux-x64-portable
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            artifact_name: arden
            asset_name: arden-macos-arm64-portable
          - os: macos-26-intel
            platform: macos
            target: x86_64-apple-darwin
            artifact_name: arden
            asset_name: arden-macos-x64-portable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache LLVM (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:\arden-toolchains\llvm-22.1.3
          key: ${{ runner.os }}-llvm-22.1.3-x64

      - uses: ./.github/actions/install-llvm
      - uses: lukka/get-cmake@latest

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $LibPath = "C:\vcpkg\installed\x64-windows-static\lib"
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\xml2s.lib" -Force
          Copy-Item "$LibPath\libxml2.lib" "$LibPath\libxml2s.lib" -Force
          echo "LIBXML2_LIB_PATH=$LibPath" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            cargo build --release --target "${{ matrix.target }}" \
              --config 'target.x86_64-unknown-linux-gnu.rustflags=["-C","target-cpu=x86-64","-C","link-arg=--as-needed","-C","link-arg=--build-id"]'
          else
            cargo build --release --target "${{ matrix.target }}"
          fi
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.platform == 'linux' && '.cargo/linkers/linux-x86_64-mold.sh' || '' }}
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: ${{ matrix.target == 'aarch64-apple-darwin' && '.cargo/linkers/macos-aarch64-lld.sh' || '' }}
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: ${{ matrix.target == 'x86_64-apple-darwin' && '.cargo/linkers/macos-x86_64-lld.sh' || '' }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: ${{ matrix.platform == 'windows' && 'lld-link' || '' }}
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && format('-C link-arg=/LIBPATH:{0}', env.LIBXML2_LIB_PATH) || '' }}

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Detect extra packaging inputs (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          echo "ARDEN_EXTRA_BIN=$(command -v mold)" >> "$GITHUB_ENV"

      - name: Detect extra packaging inputs (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          echo "ARDEN_EXTRA_PREFIX=$(brew --prefix lld)" >> "$GITHUB_ENV"

      - name: Package portable bundle
        shell: bash
        env:
          BUNDLE_LLVM_PREFIX: ${{ matrix.os == 'windows-latest' && env.ARDEN_LLVM_REAL_PREFIX || env.LLVM_SYS_221_PREFIX }}
          ARDEN_WINDOWS_VC_LIB_DIR: ${{ env.ARDEN_WINDOWS_VC_LIB_DIR }}
          ARDEN_WINDOWS_UCRT_LIB_DIR: ${{ env.ARDEN_WINDOWS_UCRT_LIB_DIR }}
          ARDEN_WINDOWS_UM_LIB_DIR: ${{ env.ARDEN_WINDOWS_UM_LIB_DIR }}
        run: |
          mkdir -p dist
          python3 scripts/release/package_release.py \
            --platform "${{ matrix.platform }}" \
            --binary "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
            --asset-name "${{ matrix.asset_name }}" \
            --bundle-root dist \
            --llvm-prefix "${BUNDLE_LLVM_PREFIX}" \
            ${ARDEN_EXTRA_PREFIX:+--extra-prefix "${ARDEN_EXTRA_PREFIX}"} \
            ${ARDEN_EXTRA_BIN:+--extra-bin "${ARDEN_EXTRA_BIN}"} \
            ${ARDEN_WINDOWS_VC_LIB_DIR:+--extra-lib-dir "vc=${ARDEN_WINDOWS_VC_LIB_DIR}"} \
            ${ARDEN_WINDOWS_UCRT_LIB_DIR:+--extra-lib-dir "ucrt=${ARDEN_WINDOWS_UCRT_LIB_DIR}"} \
            ${ARDEN_WINDOWS_UM_LIB_DIR:+--extra-lib-dir "um=${ARDEN_WINDOWS_UM_LIB_DIR}"}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}${{ matrix.platform == 'windows' && '.zip' || '.tar.gz' }}

  smoke:
    name: Smoke ${{ matrix.asset_name }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: arden-windows-x64-portable
          - os: ubuntu-latest
            platform: linux
            asset_name: arden-linux-x64-portable
          - os: macos-latest
            platform: macos
            asset_name: arden-macos-arm64-portable
          - os: macos-26-intel
            platform: macos
            asset_name: arden-macos-x64-portable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist

      - name: Smoke test portable bundle (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          bash scripts/release/smoke_portable_unix.sh \
            "dist/${{ matrix.asset_name }}.tar.gz"

      - name: Smoke test portable bundle (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          .\scripts\release\smoke_portable_windows.ps1 `
            -ArchivePath "dist/${{ matrix.asset_name }}.zip"

  quality-gates:
    name: Release Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/install-llvm

      - name: Rust checks
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
        run: |
          cargo check --locked --all-targets --all-features --verbose
          cargo test --locked --verbose -- --no-capture
          cargo test --locked --release --all-targets --verbose -- --no-capture
          cargo fmt -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit gate
        run: cargo audit

      - name: Coverage gate
        run: cargo llvm-cov --locked --workspace --all-features --fail-under-lines 55

      - name: Install Rust nightly for fuzz + sanitizer
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz smoke gate
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ${{ github.workspace }}/.cargo/linkers/linux-x86_64-mold.sh
        run: cargo fuzz run lexer_parser --sanitizer address -- -max_total_time=90 -jobs=1 -workers=1
        working-directory: fuzz

      - name: Sanitizer gate
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: .cargo/linkers/linux-x86_64-mold.sh
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -Z sanitizer=address
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: cargo test --locked --all-targets --all-features --target x86_64-unknown-linux-gnu

  release:
    name: Create Release
    needs: [smoke, quality-gates]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true 

      - name: Generate checksums
        run: python3 scripts/release/write_checksums.py all-artifacts

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: all-artifacts
          format: cyclonedx-json
          output-file: ${{ env.SBOM_FILE }}

      - name: Generate local provenance manifest
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path

          root = Path("all-artifacts")
          subjects = []
          for path in sorted(root.glob("*")):
              if path.is_file():
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  subjects.append({"name": path.name, "digest": {"sha256": digest}})

          provenance = {
              "_type": "https://in-toto.io/Statement/v1",
              "subject": subjects,
              "predicateType": "https://slsa.dev/provenance/v1",
              "predicate": {
                  "buildType": "https://github.com/anthropics/arden-compiler/release-workflow",
                  "builder": {"id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
                  "invocation": {
                      "configSource": {
                          "uri": "git+https://github.com/${{ github.repository }}@${{ github.sha }}"
                      }
                  }
              }
          }

          out = Path("${{ env.PROVENANCE_FILE }}")
          out.write_text(json.dumps(provenance, separators=(",", ":")) + "\n", encoding="utf-8")
          PY

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum manifest (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --bundle "${BUNDLE_FILE}" \
            --output-signature "${SIGNATURE_FILE}" \
            --output-certificate "${CERTIFICATE_FILE}" \
            all-artifacts/SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false 
          prerelease: false 
          files: |
            all-artifacts/arden-windows-x64-portable.zip
            all-artifacts/arden-linux-x64-portable.tar.gz
            all-artifacts/arden-macos-arm64-portable.tar.gz
            all-artifacts/arden-macos-x64-portable.tar.gz
            all-artifacts/SHA256SUMS.txt
            all-artifacts/arden-sbom.json
            all-artifacts/provenance.intoto.jsonl
            all-artifacts/SHA256SUMS.txt.sig
            all-artifacts/SHA256SUMS.txt.pem
            all-artifacts/SHA256SUMS.txt.bundle
          body: |
            ## Arden
            
            ### Available Downloads
            - **Windows x64**: `arden-windows-x64-portable.zip`
            - **Linux x64**: `arden-linux-x64-portable.tar.gz`
            - **macOS Apple Silicon**: `arden-macos-arm64-portable.tar.gz`
            - **macOS Intel**: `arden-macos-x64-portable.tar.gz`
            
            ### Installation
            Download the portable archive for your platform and extract it.

            The intended flow is:
            - extract the archive
            - run the included launcher immediately (`arden.cmd` on Windows, `./arden` on Linux/macOS)
            - optionally run the bundled install script (`install.ps1` or `install.sh`) to add Arden to your PATH

            Each archive now includes:
            - the Arden compiler
            - a bundled LLVM toolchain layout
            - the linker helper binaries Arden expects on that platform
            - a small launcher script (`arden` or `arden.cmd`)
            - a small install script for adding the launcher to PATH

            ### Checksums
            SHA-256 hashes are published in `SHA256SUMS.txt`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
