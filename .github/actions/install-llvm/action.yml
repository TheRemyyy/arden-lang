name: Install LLVM 21
description: Installs LLVM 21 on GitHub-hosted runners and exports LLVM_SYS_211_PREFIX.
runs:
  using: composite
  steps:
    - name: Install LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
        sudo apt-get install -y llvm-21-dev libpolly-21-dev lld-21
        if [ -x /usr/bin/ld.lld-21 ]; then
          sudo ln -sf /usr/bin/ld.lld-21 /usr/local/bin/ld.lld
        fi
        if [ -x /usr/bin/lld-21 ]; then
          sudo ln -sf /usr/bin/lld-21 /usr/local/bin/lld
        fi
        command -v ld.lld
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> "$GITHUB_ENV"
    - name: Install LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm@21
        LLVM_PREFIX="$(brew --prefix llvm@21)"
        LLVM_BIN="${LLVM_PREFIX}/bin"
        mkdir -p "${HOME}/.local/bin"
        if [ -x "${LLVM_BIN}/lld" ] && [ ! -e "${HOME}/.local/bin/lld" ]; then
          ln -sf "${LLVM_BIN}/lld" "${HOME}/.local/bin/lld"
        fi
        if [ -x "${LLVM_BIN}/ld.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLVM_BIN}/ld.lld" "${HOME}/.local/bin/ld.lld"
        elif [ -x "${LLVM_BIN}/ld64.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLVM_BIN}/ld64.lld" "${HOME}/.local/bin/ld.lld"
        fi
        echo "LLVM_SYS_211_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "${LLVM_BIN}" >> "$GITHUB_PATH"
        echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
        command -v ld.lld
    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=21.1.7 -y --no-progress
        $llvmConfig = $null
        $llvmPrefix = $null
        $prefixCandidates = @(
          "C:\Program Files\LLVM",
          "$env:ChocolateyInstall\lib\llvm\tools\llvm"
        ) | Where-Object { $_ -and (Test-Path $_) }

        foreach ($prefix in $prefixCandidates) {
          $candidate = Join-Path $prefix "bin\llvm-config.exe"
          if (-not (Test-Path $candidate)) {
            continue
          }
          $version = (& $candidate --version).Trim()
          if ($version.StartsWith("21.")) {
            $llvmConfig = $candidate
            $llvmPrefix = $prefix
            break
          }
        }

        if (-not $llvmConfig) {
          $chocoRoot = Join-Path $env:ChocolateyInstall "lib"
          if (Test-Path $chocoRoot) {
            $found = Get-ChildItem -Path $chocoRoot -Filter llvm-config.exe -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\llvm(\\|-)'} |
              Select-Object -ExpandProperty FullName
            foreach ($candidate in $found) {
              $version = (& $candidate --version).Trim()
              if ($version.StartsWith("21.")) {
                $llvmConfig = $candidate
                $llvmPrefix = Split-Path -Parent (Split-Path -Parent $candidate)
                break
              }
            }
          }
        }

        if (-not $llvmConfig) {
          if ($prefixCandidates.Count -gt 0) {
            $llvmPrefix = $prefixCandidates[0]
            $llvmBin = Join-Path $llvmPrefix "bin"
            if (Test-Path $llvmBin) {
              $llvmPrefixUnix = $llvmPrefix -replace '\\','/'
              echo "LLVM_SYS_211_PREFIX=$llvmPrefixUnix" >> $env:GITHUB_ENV
              echo "$llvmBin" >> $env:GITHUB_PATH
              Write-Host "Configured LLVM without llvm-config from prefix: $llvmPrefix"
              exit 0
            }
          }
          throw "LLVM 21 llvm-config.exe not found after LLVM install"
        }

        $llvmVersion = (& $llvmConfig --version).Trim()
        $llvmBin = Split-Path -Parent $llvmConfig
        if (-not $llvmPrefix) {
          $llvmPrefix = Split-Path -Parent $llvmBin
        }
        $llvmPrefixUnix = $llvmPrefix -replace '\\','/'
        $llvmConfigUnix = $llvmConfig -replace '\\','/'

        echo "LLVM_SYS_211_PREFIX=$llvmPrefixUnix" >> $env:GITHUB_ENV
        echo "LLVM_CONFIG_PATH=$llvmConfigUnix" >> $env:GITHUB_ENV
        echo "$llvmBin" >> $env:GITHUB_PATH
