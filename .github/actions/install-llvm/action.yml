name: Install LLVM 22
description: Installs an LLVM 22 toolchain on GitHub-hosted runners and exports LLVM_SYS_221_PREFIX.
runs:
  using: composite
  steps:
    - name: Install LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        LLVM_VERSIONS=(22.1.4 22.1.3 22.1.2 22.1.1 22.1.0)
        download_llvm_archive() {
          local url="$1"
          local output="$2"
          curl --fail --silent --show-error --location \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 20 \
            --max-time 600 \
            "$url" -o "$output"
        }

        INSTALL_OK=0
        LLVM_PREFIX=""
        for LLVM_VERSION in "${LLVM_VERSIONS[@]}"; do
          LLVM_PREFIX="${RUNNER_TEMP}/llvm-${LLVM_VERSION}"
          if [ -x "${LLVM_PREFIX}/bin/llvm-config" ] && "${LLVM_PREFIX}/bin/llvm-config" --version >/dev/null 2>&1; then
            INSTALL_OK=1
            break
          fi

          rm -rf "${LLVM_PREFIX}"
          LLVM_ARCHIVES=(
            "clang+llvm-${LLVM_VERSION}-x86_64-linux-gnu-ubuntu-24.04.tar.xz"
            "clang+llvm-${LLVM_VERSION}-x86_64-linux-gnu-ubuntu-22.04.tar.xz"
            "clang+llvm-${LLVM_VERSION}-x86_64-linux-gnu-ubuntu-20.04.tar.xz"
            "LLVM-${LLVM_VERSION}-Linux-X64.tar.xz"
          )
          for LLVM_ARCHIVE in "${LLVM_ARCHIVES[@]}"; do
            LLVM_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${LLVM_ARCHIVE}"
            rm -rf "${RUNNER_TEMP}/llvm-extract" "${LLVM_PREFIX}"
            mkdir -p "${RUNNER_TEMP}/llvm-extract"
            if ! download_llvm_archive "${LLVM_URL}" "${RUNNER_TEMP}/${LLVM_ARCHIVE}"; then
              continue
            fi
            if ! tar -xf "${RUNNER_TEMP}/${LLVM_ARCHIVE}" -C "${RUNNER_TEMP}/llvm-extract"; then
              continue
            fi
            EXTRACTED_DIR="$(find "${RUNNER_TEMP}/llvm-extract" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [ -z "${EXTRACTED_DIR}" ]; then
              continue
            fi
            mv "${EXTRACTED_DIR}" "${LLVM_PREFIX}"
            if "${LLVM_PREFIX}/bin/llvm-config" --version >/dev/null 2>&1; then
              INSTALL_OK=1
              break 2
            fi
          done
        done

        if [ "${INSTALL_OK}" -ne 1 ]; then
          echo "error: unable to install runnable LLVM 22.x toolchain on this Linux runner" >&2
          exit 1
        fi
        sudo apt-get update
        sudo apt-get install -y mold
        command -v mold
        echo "LLVM_SYS_221_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

    - name: Install LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm lld
        LLVM_PREFIX="$(brew --prefix llvm)"
        LLVM_BIN="${LLVM_PREFIX}/bin"
        LLD_PREFIX="$(brew --prefix lld)"
        LLD_BIN="${LLD_PREFIX}/bin"
        mkdir -p "${HOME}/.local/bin"
        if [ -x "${LLD_BIN}/lld" ] && [ ! -e "${HOME}/.local/bin/lld" ]; then
          ln -sf "${LLD_BIN}/lld" "${HOME}/.local/bin/lld"
        fi
        if [ -x "${LLD_BIN}/ld.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld.lld" "${HOME}/.local/bin/ld.lld"
        elif [ -x "${LLD_BIN}/ld64.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld64.lld" "${HOME}/.local/bin/ld.lld"
        fi
        LLVM_VERSION="$("${LLVM_BIN}/llvm-config" --version)"
        case "${LLVM_VERSION}" in
          22.*) ;;
          *)
            echo "error: expected Homebrew llvm major version 22, got ${LLVM_VERSION}" >&2
            exit 1
            ;;
        esac
        echo "LLVM_SYS_221_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "${LLVM_BIN}" >> "$GITHUB_PATH"
        echo "${LLD_BIN}" >> "$GITHUB_PATH"
        echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
        command -v ld.lld

    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $llvmVersions = @("22.1.4", "22.1.3", "22.1.2", "22.1.1", "22.1.0")
        $llvmVersion = $null
        $llvmPrefix = $null
        $llvmBin = $null
        $llvmLib = $null
        $llvmInclude = $null
        $lldLinkExe = $null
        $shimRoot = Join-Path $env:RUNNER_TEMP "llvm-shim"
        $shimBin = Join-Path $shimRoot "bin"
        $llvmConfig = Join-Path $shimBin "llvm-config.cmd"

        function Download-LlvmArchive {
          param(
            [Parameter(Mandatory = $true)][string]$Url,
            [Parameter(Mandatory = $true)][string]$OutFile
          )

          $attempt = 0
          while ($attempt -lt 6) {
            try {
              Invoke-WebRequest -Uri $Url -OutFile $OutFile -MaximumRetryCount 0
              return $true
            } catch {
              $attempt += 1
              if ($attempt -ge 6) {
                return $false
              }
              Start-Sleep -Seconds ([Math]::Min(20, 2 * $attempt))
            }
          }
          return $false
        }

        foreach ($candidateVersion in $llvmVersions) {
          $candidatePrefix = "C:\arden-toolchains\llvm-$candidateVersion"
          $candidateBin = Join-Path $candidatePrefix "bin"
          $candidateLib = Join-Path $candidatePrefix "lib"
          $candidateInclude = Join-Path $candidatePrefix "include"
          $candidateLldLinkExe = Join-Path $candidateBin "lld-link.exe"

          if (-not (Test-Path $candidateLldLinkExe)) {
            $archiveNames = @(
              "clang+llvm-$candidateVersion-x86_64-pc-windows-msvc.tar.xz",
              "LLVM-$candidateVersion-Windows-X64.tar.xz"
            )
            foreach ($archiveName in $archiveNames) {
              $archiveUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$candidateVersion/$archiveName"
              $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
              $extractRoot = Join-Path $env:RUNNER_TEMP "llvm-extract"
              if (Test-Path $candidatePrefix) {
                Remove-Item -Recurse -Force $candidatePrefix
              }
              if (Test-Path $extractRoot) {
                Remove-Item -Recurse -Force $extractRoot
              }
              New-Item -ItemType Directory -Force -Path (Split-Path -Parent $candidatePrefix) | Out-Null
              New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
              if (-not (Download-LlvmArchive -Url $archiveUrl -OutFile $archivePath)) {
                continue
              }
              tar -xf $archivePath -C $extractRoot
              $extractedDir = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
              if (-not $extractedDir) {
                continue
              }
              Move-Item -Path $extractedDir.FullName -Destination $candidatePrefix
              if (Test-Path $candidateLldLinkExe) {
                break
              }
            }
          }

          if (Test-Path $candidateLldLinkExe) {
            $llvmVersion = $candidateVersion
            $llvmPrefix = $candidatePrefix
            $llvmBin = $candidateBin
            $llvmLib = $candidateLib
            $llvmInclude = $candidateInclude
            $lldLinkExe = $candidateLldLinkExe
            break
          }
        }

        if (-not (Test-Path $lldLinkExe)) {
          throw "unable to install runnable LLVM 22.x toolchain on this Windows runner"
        }
        if (-not (Test-Path $llvmLib)) {
          throw "LLVM lib directory not found: $llvmLib"
        }
        if (-not (Test-Path $llvmInclude)) {
          throw "LLVM include directory not found: $llvmInclude"
        }

        $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vsWhere)) {
          throw "vswhere.exe not found: $vsWhere"
        }

        $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vsInstallPath) {
          throw "Visual Studio C++ toolchain installation not found via vswhere"
        }

        $msvcRoot = Get-ChildItem -Path (Join-Path $vsInstallPath "VC\Tools\MSVC") -Directory |
          Sort-Object Name -Descending |
          Select-Object -First 1
        if (-not $msvcRoot) {
          throw "MSVC tools directory not found under $vsInstallPath"
        }

        $vcLibDir = Join-Path $msvcRoot.FullName "lib\x64"
        if (-not (Test-Path $vcLibDir)) {
          throw "MSVC x64 lib directory not found: $vcLibDir"
        }

        $windowsKitLibRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\Lib"
        $windowsKitVersion = Get-ChildItem -Path $windowsKitLibRoot -Directory |
          Sort-Object Name -Descending |
          Select-Object -First 1
        if (-not $windowsKitVersion) {
          throw "Windows SDK Lib directory not found: $windowsKitLibRoot"
        }

        $ucrtLibDir = Join-Path $windowsKitVersion.FullName "ucrt\x64"
        $umLibDir = Join-Path $windowsKitVersion.FullName "um\x64"
        if (-not (Test-Path $ucrtLibDir)) {
          throw "Windows SDK UCRT lib directory not found: $ucrtLibDir"
        }
        if (-not (Test-Path $umLibDir)) {
          throw "Windows SDK UM lib directory not found: $umLibDir"
        }

        $builtinsLib = Get-ChildItem -Path (Join-Path $llvmLib "clang") -Filter "clang_rt.builtins-x86_64.lib" -Recurse -File |
          Select-Object -First 1 -ExpandProperty FullName
        if (-not $builtinsLib) {
          throw "Windows LLVM builtins library not found under $llvmLib\\clang"
        }

        if (Test-Path $shimRoot) {
          Remove-Item -Recurse -Force $shimRoot
        }
        New-Item -ItemType Directory -Force -Path $shimBin | Out-Null

        $shimCode = @'
        @echo off
        setlocal enabledelayedexpansion
        set "prefix=%ARDEN_LLVM_REAL_PREFIX%"
        if "%prefix%"=="" exit /b 1
        set "version=%ARDEN_LLVM_SHIM_VERSION%"
        if "%version%"=="" set "version=22.1.3"
        set "command="
        :scan
        if "%~1"=="" goto run
        if "%~1"=="--link-static" shift & goto scan
        if "%~1"=="--link-shared" shift & goto scan
        set "command=%~1"
        goto run
        :run
        if "%command%"=="" exit /b 1
        if "%command%"=="--version" echo %version% & exit /b 0
        if "%command%"=="--libdir" echo %prefix%\lib & exit /b 0
        if "%command%"=="--cflags" echo -I%prefix%\include & exit /b 0
        if "%command%"=="--build-mode" echo Release & exit /b 0
        if "%command%"=="--libnames" (
          set "first=1"
          for %%F in ("%prefix%\lib\*.lib") do (
            set "name=%%~nxF"
            if /I "!name:~0,4!"=="LLVM" (
              if "!first!"=="1" (
                <nul set /p "=!name!"
                set "first=0"
              ) else (
                <nul set /p "= !name!"
              )
            ) else if /I "!name!"=="LTO.lib" (
              if "!first!"=="1" (
                <nul set /p "=!name!"
                set "first=0"
              ) else (
                <nul set /p "= !name!"
              )
            ) else if /I "!name!"=="Remarks.lib" (
              if "!first!"=="1" (
                <nul set /p "=!name!"
                set "first=0"
              ) else (
                <nul set /p "= !name!"
              )
            ) else if /I "!name:~0,5!"=="Polly" (
              if "!first!"=="1" (
                <nul set /p "=!name!"
                set "first=0"
              ) else (
                <nul set /p "= !name!"
              )
            )
          )
          echo.
          exit /b 0
        )
        if "%command%"=="--system-libs" exit /b 0
        exit /b 1
        '@
        $shimCode | Set-Content -Path $llvmConfig -Encoding ASCII

        echo "ARDEN_LLVM_REAL_PREFIX=$llvmPrefix" >> $env:GITHUB_ENV
        echo "ARDEN_LLVM_SHIM_VERSION=$llvmVersion" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_VC_LIB_DIR=$vcLibDir" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_UCRT_LIB_DIR=$ucrtLibDir" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_UM_LIB_DIR=$umLibDir" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_BUILTINS_LIB=$builtinsLib" >> $env:GITHUB_ENV
        echo "LLVM_SYS_221_PREFIX=$llvmPrefix" >> $env:GITHUB_ENV
        echo "LLVM_CONFIG_PATH=$llvmConfig" >> $env:GITHUB_ENV
        echo "$shimBin" >> $env:GITHUB_PATH
        echo "$llvmBin" >> $env:GITHUB_PATH
