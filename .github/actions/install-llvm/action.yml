name: Install LLVM 21
description: Installs LLVM 21 on GitHub-hosted runners and exports LLVM_SYS_211_PREFIX.
runs:
  using: composite
  steps:
    - name: Install LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
        sudo apt-get install -y llvm-21-dev libpolly-21-dev lld-21
        if [ -x /usr/bin/ld.lld-21 ]; then
          sudo ln -sf /usr/bin/ld.lld-21 /usr/local/bin/ld.lld
        fi
        if [ -x /usr/bin/lld-21 ]; then
          sudo ln -sf /usr/bin/lld-21 /usr/local/bin/lld
        fi
        command -v ld.lld
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> "$GITHUB_ENV"
    - name: Install LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm@21 lld@21
        LLVM_PREFIX="$(brew --prefix llvm@21)"
        LLVM_BIN="${LLVM_PREFIX}/bin"
        LLD_PREFIX="$(brew --prefix lld@21)"
        LLD_BIN="${LLD_PREFIX}/bin"
        mkdir -p "${HOME}/.local/bin"
        if [ -x "${LLD_BIN}/lld" ] && [ ! -e "${HOME}/.local/bin/lld" ]; then
          ln -sf "${LLD_BIN}/lld" "${HOME}/.local/bin/lld"
        fi
        if [ -x "${LLD_BIN}/ld.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld.lld" "${HOME}/.local/bin/ld.lld"
        elif [ -x "${LLD_BIN}/ld64.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld64.lld" "${HOME}/.local/bin/ld.lld"
        fi
        echo "LLVM_SYS_211_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "${LLVM_BIN}" >> "$GITHUB_PATH"
        echo "${LLD_BIN}" >> "$GITHUB_PATH"
        echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
        command -v ld.lld
    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=21.1.7 -y --no-progress
        $llvmPrefix = $null
        $llvmConfig = $null
        $prefixCandidates = @(
          "C:\Program Files\LLVM",
          "$env:ChocolateyInstall\lib\llvm\tools\llvm"
        ) | Where-Object { $_ -and (Test-Path $_) }

        foreach ($prefix in $prefixCandidates) {
          $candidateConfig = Join-Path $prefix "bin\llvm-config.exe"
          if (Test-Path $candidateConfig) {
            $llvmPrefix = $prefix
            $llvmConfig = $candidateConfig
            break
          }
        }

        if (-not $llvmPrefix) {
          foreach ($prefix in $prefixCandidates) {
            $candidateClang = Join-Path $prefix "bin\clang.exe"
            if (Test-Path $candidateClang) {
              $version = (& $candidateClang --version 2>$null | Select-Object -First 1)
              if ($version -match 'clang version 21\.') {
                $llvmPrefix = $prefix
                break
              }
            }
          }
        }

        if (-not $llvmPrefix) {
          $chocoRoot = Join-Path $env:ChocolateyInstall "lib"
          if (Test-Path $chocoRoot) {
            $found = Get-ChildItem -Path $chocoRoot -Filter llvm-config.exe -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\llvm(\\|-)'} |
              Select-Object -ExpandProperty FullName
            foreach ($candidate in $found) {
              $version = (& $candidate --version 2>$null | Select-Object -First 1)
              if ($version -match 'version 21\.') {
                $llvmPrefix = Split-Path -Parent (Split-Path -Parent $candidate)
                $llvmConfig = $candidate
                break
              }
            }
          }
        }

        if (-not $llvmPrefix) {
          $chocoRoot = Join-Path $env:ChocolateyInstall "lib"
          if (Test-Path $chocoRoot) {
            $found = Get-ChildItem -Path $chocoRoot -Filter clang.exe -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\llvm(\\|-)'} |
              Select-Object -ExpandProperty FullName
            foreach ($candidate in $found) {
              $version = (& $candidate --version 2>$null | Select-Object -First 1)
              if ($version -match 'clang version 21\.') {
                $llvmPrefix = Split-Path -Parent (Split-Path -Parent $candidate)
                break
              }
            }
          }
        }

        if (-not $llvmPrefix) {
          throw "LLVM 21 installation prefix not found after LLVM install"
        }

        $llvmBin = Join-Path $llvmPrefix "bin"
        $llvmLib = Join-Path $llvmPrefix "lib"
        $clangPath = Join-Path $llvmBin "clang.exe"
        if (-not (Test-Path $clangPath)) {
          throw "clang.exe not found in LLVM bin directory: $llvmBin"
        }
        if (-not (Test-Path $llvmLib)) {
          throw "LLVM lib directory not found: $llvmLib"
        }

        if (-not $llvmConfig) {
          $llvmConfig = Join-Path $llvmBin "llvm-config.exe"
        }

        if (-not (Test-Path $llvmConfig)) {
          $clangVersionLine = (& $clangPath --version 2>$null | Select-Object -First 1)
          if ($clangVersionLine -notmatch 'clang version ([0-9]+\.[0-9]+\.[0-9]+)') {
            throw "Unable to derive LLVM version from clang.exe at $clangPath"
          }
          $llvmVersion = $Matches[1]
          $shimRoot = Join-Path $env:RUNNER_TEMP "llvm-shim"
          $shimBin = Join-Path $shimRoot "bin"
          New-Item -ItemType Directory -Force -Path $shimBin | Out-Null
          $shimSource = Join-Path $env:RUNNER_TEMP "llvm-config-shim.cs"
          $escapedPrefix = $llvmPrefix.Replace('\', '\\')
          $escapedVersion = $llvmVersion.Replace('\', '\\')
          $shimCode = @"
          using System;
          using System.IO;
          using System.Linq;

          internal static class Program
          {
              private static readonly string Prefix = @"$escapedPrefix";
              private static readonly string LibDir = Path.Combine(Prefix, "lib");
              private static readonly string IncludeDir = Path.Combine(Prefix, "include");
              private static readonly string Version = "$escapedVersion";

              private static int Main(string[] args)
              {
                  var filtered = args.Where(arg => arg != "--link-static" && arg != "--link-shared").ToArray();
                  if (filtered.Length == 0)
                  {
                      return 1;
                  }

                  switch (filtered[0])
                  {
                      case "--version":
                          Console.WriteLine(Version);
                          return 0;
                      case "--libdir":
                          Console.WriteLine(LibDir);
                          return 0;
                      case "--cflags":
                          Console.WriteLine("-I" + IncludeDir);
                          return 0;
                      case "--build-mode":
                          Console.WriteLine("Release");
                          return 0;
                      case "--libnames":
                          var libs = Directory.EnumerateFiles(LibDir, "*.lib")
                              .Select(Path.GetFileName)
                              .Where(name =>
                                  name.StartsWith("LLVM", StringComparison.OrdinalIgnoreCase) ||
                                  string.Equals(name, "LTO.lib", StringComparison.OrdinalIgnoreCase) ||
                                  string.Equals(name, "Remarks.lib", StringComparison.OrdinalIgnoreCase) ||
                                  name.StartsWith("Polly", StringComparison.OrdinalIgnoreCase))
                              .OrderBy(name => name, StringComparer.OrdinalIgnoreCase);
                          Console.WriteLine(string.Join(" ", libs));
                          return 0;
                      case "--system-libs":
                          Console.WriteLine(string.Empty);
                          return 0;
                      default:
                          return 1;
                  }
              }
          }
          "@
          $shimCode | Set-Content -Path $shimSource -Encoding UTF8

          Add-Type -TypeDefinition (Get-Content $shimSource -Raw) `
            -Language CSharp `
            -OutputAssembly (Join-Path $shimBin "llvm-config.exe") `
            -OutputType ConsoleApplication

          $llvmConfig = Join-Path $shimBin "llvm-config.exe"
          $llvmPrefix = $shimRoot
        }

        echo "LLVM_SYS_211_PREFIX=$llvmPrefix" >> $env:GITHUB_ENV
        echo "LLVM_CONFIG_PATH=$llvmConfig" >> $env:GITHUB_ENV
        echo "$llvmBin" >> $env:GITHUB_PATH
