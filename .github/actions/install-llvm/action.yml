name: Install LLVM 21
description: Installs LLVM 21 on GitHub-hosted runners and exports LLVM_SYS_211_PREFIX.
runs:
  using: composite
  steps:
    - name: Install LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
        sudo apt-get install -y llvm-21-dev libpolly-21-dev mold
        command -v mold
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> "$GITHUB_ENV"

    - name: Install LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm@21 lld@21
        LLVM_PREFIX="$(brew --prefix llvm@21)"
        LLVM_BIN="${LLVM_PREFIX}/bin"
        LLD_PREFIX="$(brew --prefix lld@21)"
        LLD_BIN="${LLD_PREFIX}/bin"
        mkdir -p "${HOME}/.local/bin"
        if [ -x "${LLD_BIN}/lld" ] && [ ! -e "${HOME}/.local/bin/lld" ]; then
          ln -sf "${LLD_BIN}/lld" "${HOME}/.local/bin/lld"
        fi
        if [ -x "${LLD_BIN}/ld.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld.lld" "${HOME}/.local/bin/ld.lld"
        elif [ -x "${LLD_BIN}/ld64.lld" ] && [ ! -e "${HOME}/.local/bin/ld.lld" ]; then
          ln -sf "${LLD_BIN}/ld64.lld" "${HOME}/.local/bin/ld.lld"
        fi
        echo "LLVM_SYS_211_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "${LLVM_BIN}" >> "$GITHUB_PATH"
        echo "${LLD_BIN}" >> "$GITHUB_PATH"
        echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
        command -v ld.lld

    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $llvmVersion = "21.1.8"
        $llvmPrefix = "C:\arden-toolchains\llvm-$llvmVersion"
        $llvmBin = Join-Path $llvmPrefix "bin"
        $llvmLib = Join-Path $llvmPrefix "lib"
        $llvmInclude = Join-Path $llvmPrefix "include"
        $clangExe = Join-Path $llvmBin "clang.exe"
        $lldLinkExe = Join-Path $llvmBin "lld-link.exe"
        $shimRoot = Join-Path $env:RUNNER_TEMP "llvm-shim"
        $shimBin = Join-Path $shimRoot "bin"
        $llvmConfig = Join-Path $shimBin "llvm-config.exe"

        if (-not (Test-Path $clangExe)) {
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $archiveUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractRoot = Join-Path $env:RUNNER_TEMP "llvm-extract"
          if (Test-Path $llvmPrefix) {
            Remove-Item -Recurse -Force $llvmPrefix
          }
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $llvmPrefix) | Out-Null
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          Invoke-WebRequest -Uri $archiveUrl -OutFile $archivePath
          tar -xf $archivePath -C $extractRoot
          $extractedDir = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if (-not $extractedDir) {
            throw "Failed to extract LLVM archive: $archiveName"
          }
          Move-Item -Path $extractedDir.FullName -Destination $llvmPrefix
        }

        if (-not (Test-Path $clangExe)) {
          throw "clang.exe not found in LLVM bin directory: $llvmBin"
        }
        if (-not (Test-Path $lldLinkExe)) {
          throw "lld-link.exe not found in LLVM bin directory: $llvmBin"
        }
        if (-not (Test-Path $llvmLib)) {
          throw "LLVM lib directory not found: $llvmLib"
        }
        if (-not (Test-Path $llvmInclude)) {
          throw "LLVM include directory not found: $llvmInclude"
        }

        $vsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vsWhere)) {
          throw "vswhere.exe not found: $vsWhere"
        }

        $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $vsInstallPath) {
          throw "Visual Studio C++ toolchain installation not found via vswhere"
        }

        $msvcRoot = Get-ChildItem -Path (Join-Path $vsInstallPath "VC\Tools\MSVC") -Directory |
          Sort-Object Name -Descending |
          Select-Object -First 1
        if (-not $msvcRoot) {
          throw "MSVC tools directory not found under $vsInstallPath"
        }

        $vcLibDir = Join-Path $msvcRoot.FullName "lib\x64"
        if (-not (Test-Path $vcLibDir)) {
          throw "MSVC x64 lib directory not found: $vcLibDir"
        }

        $windowsKitLibRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\Lib"
        $windowsKitVersion = Get-ChildItem -Path $windowsKitLibRoot -Directory |
          Sort-Object Name -Descending |
          Select-Object -First 1
        if (-not $windowsKitVersion) {
          throw "Windows SDK Lib directory not found: $windowsKitLibRoot"
        }

        $ucrtLibDir = Join-Path $windowsKitVersion.FullName "ucrt\x64"
        $umLibDir = Join-Path $windowsKitVersion.FullName "um\x64"
        if (-not (Test-Path $ucrtLibDir)) {
          throw "Windows SDK UCRT lib directory not found: $ucrtLibDir"
        }
        if (-not (Test-Path $umLibDir)) {
          throw "Windows SDK UM lib directory not found: $umLibDir"
        }

        if (Test-Path $shimRoot) {
          Remove-Item -Recurse -Force $shimRoot
        }
        New-Item -ItemType Directory -Force -Path $shimBin | Out-Null

        $shimSource = Join-Path $env:RUNNER_TEMP "llvm-config-shim.c"
        $shimCode = @(
          '#include <stdio.h>',
          '#include <stdlib.h>',
          '#include <string.h>',
          '#include <windows.h>',
          '',
          'static void print_libnames(const char* prefix)',
          '{',
          '    char pattern[MAX_PATH];',
          '    WIN32_FIND_DATAA find_data;',
          '    HANDLE handle;',
          '    int first = 1;',
          '',
          '    snprintf(pattern, sizeof(pattern), "%s\\lib\\*.lib", prefix);',
          '    handle = FindFirstFileA(pattern, &find_data);',
          '    if (handle == INVALID_HANDLE_VALUE) {',
          '        return;',
          '    }',
          '',
          '    do {',
          '        const char* name = find_data.cFileName;',
          '        if (strncmp(name, "LLVM", 4) == 0 || strcmp(name, "LTO.lib") == 0 || strcmp(name, "Remarks.lib") == 0 || strncmp(name, "Polly", 5) == 0) {',
          '            if (!first) {',
          '                printf(" ");',
          '            }',
          '            printf("%s", name);',
          '            first = 0;',
          '        }',
          '    } while (FindNextFileA(handle, &find_data));',
          '',
          '    FindClose(handle);',
          '}',
          '',
          'int main(int argc, char** argv)',
          '{',
          '    int i;',
          '    const char* prefix = getenv("ARDEN_LLVM_REAL_PREFIX");',
          '    const char* version = getenv("ARDEN_LLVM_SHIM_VERSION");',
          '    const char* command = NULL;',
          '',
          '    if (prefix == NULL || prefix[0] == ''\0'') {',
          '        return 1;',
          '    }',
          '    if (version == NULL || version[0] == ''\0'') {',
          '        version = "21.1.8";',
          '    }',
          '',
          '    for (i = 1; i < argc; ++i) {',
          '        if (strcmp(argv[i], "--link-static") == 0 || strcmp(argv[i], "--link-shared") == 0) {',
          '            continue;',
          '        }',
          '        command = argv[i];',
          '        break;',
          '    }',
          '',
          '    if (command == NULL) {',
          '        return 1;',
          '    }',
          '    if (strcmp(command, "--version") == 0) {',
          '        printf("%s\n", version);',
          '        return 0;',
          '    }',
          '    if (strcmp(command, "--libdir") == 0) {',
          '        printf("%s\\lib\n", prefix);',
          '        return 0;',
          '    }',
          '    if (strcmp(command, "--cflags") == 0) {',
          '        printf("-I%s\\include\n", prefix);',
          '        return 0;',
          '    }',
          '    if (strcmp(command, "--build-mode") == 0) {',
          '        printf("Release\n");',
          '        return 0;',
          '    }',
          '    if (strcmp(command, "--libnames") == 0) {',
          '        print_libnames(prefix);',
          '        return 0;',
          '    }',
          '    if (strcmp(command, "--system-libs") == 0) {',
          '        return 0;',
          '    }',
          '    return 1;',
          '}'
        ) -join "`n"
        $shimCode | Set-Content -Path $shimSource -Encoding UTF8

        & $clangExe -O2 -o $llvmConfig $shimSource
        if ($LASTEXITCODE -ne 0 -or -not (Test-Path $llvmConfig)) {
          throw "Failed to compile llvm-config shim with clang.exe"
        }

        echo "ARDEN_LLVM_REAL_PREFIX=$llvmPrefix" >> $env:GITHUB_ENV
        echo "ARDEN_LLVM_SHIM_VERSION=$llvmVersion" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_VC_LIB_DIR=$vcLibDir" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_UCRT_LIB_DIR=$ucrtLibDir" >> $env:GITHUB_ENV
        echo "ARDEN_WINDOWS_UM_LIB_DIR=$umLibDir" >> $env:GITHUB_ENV
        echo "LLVM_SYS_211_PREFIX=$shimRoot" >> $env:GITHUB_ENV
        echo "LLVM_CONFIG_PATH=$llvmConfig" >> $env:GITHUB_ENV
        echo "$llvmBin" >> $env:GITHUB_PATH
