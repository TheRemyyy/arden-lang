name: Install LLVM 21
description: Installs LLVM 21 on GitHub-hosted runners and exports LLVM_SYS_211_PREFIX.
runs:
  using: composite
  steps:
    - name: Install LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
        sudo apt-get install -y llvm-21-dev libpolly-21-dev lld-21
        if [ -x /usr/bin/ld.lld-21 ]; then
          sudo ln -sf /usr/bin/ld.lld-21 /usr/local/bin/ld.lld
        fi
        if [ -x /usr/bin/lld-21 ]; then
          sudo ln -sf /usr/bin/lld-21 /usr/local/bin/lld
        fi
        command -v ld.lld
        echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> "$GITHUB_ENV"
    - name: Install LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm@21
        echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> "$GITHUB_ENV"
        echo "$(brew --prefix llvm@21)/bin" >> "$GITHUB_PATH"
        command -v ld.lld || true
    - name: Install LLVM (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=21.1.7 -y --no-progress
        $llvmConfig = (Get-Command llvm-config.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1)
        if (-not $llvmConfig) {
          $candidates = @(
            "C:\Program Files\LLVM\bin\llvm-config.exe",
            "$env:ChocolateyInstall\lib\llvm\tools\llvm\bin\llvm-config.exe"
          )
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              $llvmConfig = $candidate
              break
            }
          }
        }
        if (-not $llvmConfig) {
          throw "llvm-config.exe not found after LLVM install"
        }

        $llvmVersion = (& $llvmConfig --version).Trim()
        if (-not $llvmVersion.StartsWith("21.")) {
          throw "Expected LLVM 21.x, got $llvmVersion at $llvmConfig"
        }

        $llvmBin = Split-Path -Parent $llvmConfig
        $llvmPrefix = Split-Path -Parent $llvmBin
        $llvmPrefixUnix = $llvmPrefix -replace '\\','/'
        $llvmConfigUnix = $llvmConfig -replace '\\','/'

        echo "LLVM_SYS_211_PREFIX=$llvmPrefixUnix" >> $env:GITHUB_ENV
        echo "LLVM_CONFIG_PATH=$llvmConfigUnix" >> $env:GITHUB_ENV
        echo "$llvmBin" >> $env:GITHUB_PATH
